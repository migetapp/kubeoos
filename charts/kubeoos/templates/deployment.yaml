apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeoos.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeoos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubeoos.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeoos.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubeoos.serviceAccountName" . }}
      containers:
        - name: kubeoos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --not-ready-timeout={{ .Values.args.notReadyTimeout }}
            - --max-unhealthy-percent={{ .Values.args.maxUnhealthyPercent }}
            - --check-interval={{ .Values.args.checkInterval }}
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --namespace={{ .Release.Namespace }}
            - --v={{ .Values.args.logLevel }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
